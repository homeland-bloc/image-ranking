<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in... - Peony</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom,
                rgba(252, 231, 243, 0.5),
                rgba(255, 255, 255, 1) 30%,
                rgba(220, 252, 231, 0.5)
            );
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #C77BA6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .flower { font-size: 3rem; margin-bottom: 1rem; }
        h2 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <div class="flower">🌺</div>
        <div class="spinner"></div>
        <h2 id="status">Logging you in...</h2>
        <p id="message">Please wait a moment</p>
    </div>

    <script>
        const firebaseConfig = {
            projectId: "peony-fire"
        };
        firebase.initializeApp(firebaseConfig);

        const SUPABASE_URL = 'https://tbduuuzwbiidjgztupfp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRiZHV1dXp3YmlpZGpnenR1cGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0NTI3NjcsImV4cCI6MjA4MDAyODc2N30.lMDbB1I7vNoMFCncGw7_i9hUtWp-mO9rsmFLgd3GMMQ';
        const WORKER_URL = 'https://peony-proxy.backpackcashback.workers.dev';
        const DISCORD_REDIRECT_URI = 'https://bicipikay.github.io/peony/auth/callback';

        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const errorDescription = params.get('error_description');

            if (error) {
                document.getElementById('status').textContent = 'Login failed';
                document.getElementById('message').textContent = errorDescription || error;
                document.getElementById('message').className = 'error';
                setTimeout(() => window.location.href = '../index.html', 3000);
                return;
            }

            if (!code) {
                document.getElementById('status').textContent = 'No authorization code received';
                document.getElementById('message').textContent = 'Redirecting...';
                setTimeout(() => window.location.href = '../index.html', 2000);
                return;
            }

            const codeVerifier = sessionStorage.getItem('pkce_verifier');
            if (!codeVerifier) {
                document.getElementById('status').textContent = 'Login session expired';
                document.getElementById('message').textContent = 'Please try logging in again.';
                document.getElementById('message').className = 'error';
                setTimeout(() => window.location.href = '../index.html', 3000);
                return;
            }
            sessionStorage.removeItem('pkce_verifier');

            try {
                // Exchange authorization code via Worker — returns firebase_token + discord tokens + discord_user
                const tokenResponse = await fetch(`${WORKER_URL}/discord-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code,
                        code_verifier: codeVerifier,
                        redirect_uri: DISCORD_REDIRECT_URI
                    })
                });

                if (!tokenResponse.ok) {
                    const errorData = await tokenResponse.text();
                    throw new Error(`Token exchange failed: ${errorData}`);
                }

                const tokens = await tokenResponse.json();
                const { firebase_token, access_token, refresh_token, expires_in, discord_user } = tokens;

                if (!firebase_token || !discord_user) {
                    throw new Error('Incomplete response from auth worker');
                }

                // Sign into Firebase with the custom token
                await firebase.auth().signInWithCustomToken(firebase_token);
                const firebaseToken = await firebase.auth().currentUser.getIdToken();

                // Check if user is banned (anonymous read — goes direct to Supabase)
                const banCheckResponse = await fetch(
                    `${SUPABASE_URL}/rest/v1/users?id=eq.${discord_user.id}&select=is_banned`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Cache-Control': 'no-cache'
                        }
                    }
                );

                const existingUser = await banCheckResponse.json();
                if (existingUser && existingUser.length > 0 && existingUser[0].is_banned === true) {
                    document.getElementById('status').textContent = 'Account Banned';
                    document.getElementById('message').textContent = 'Your account has been banned from Peony.';
                    document.getElementById('message').className = 'error';
                    document.querySelector('.spinner').style.display = 'none';
                    setTimeout(() => window.location.href = '../index.html', 3000);
                    return;
                }

                // Build user session object
                const avatarUrl = discord_user.avatar
                    ? `https://cdn.discordapp.com/avatars/${discord_user.id}/${discord_user.avatar}.png`
                    : `https://api.dicebear.com/7.x/avataaars/svg?seed=${discord_user.id}`;

                const user = {
                    id: discord_user.id,
                    username: discord_user.username,
                    avatar: avatarUrl,
                    firebaseToken,
                    accessToken: access_token,
                    refreshToken: refresh_token,
                    tokenExpiry: Date.now() + expires_in * 1000,
                    discord_user
                };

                localStorage.setItem('peony_user', JSON.stringify(user));

                // Create/update user in Supabase via Worker proxy (authenticated write)
                console.log('👤 Creating/updating user in database:', user.id, user.username);
                try {
                    const upsertResponse = await fetch(`${WORKER_URL}/rest/v1/users`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${firebaseToken}`,
                            'Prefer': 'resolution=merge-duplicates'
                        },
                        body: JSON.stringify({
                            id: user.id,
                            username: user.username,
                            avatar: user.avatar,
                            is_banned: false
                        })
                    });

                    if (!upsertResponse.ok) {
                        const errorText = await upsertResponse.text();
                        console.error('❌ Failed to upsert user to database:', errorText);
                    } else {
                        console.log('✅ User successfully upserted to database');
                    }
                } catch (dbError) {
                    console.error('❌ Error upserting user to database:', dbError);
                    // Don't throw — allow login to continue even if database insert fails
                }

                // Redirect to app or pending route
                const pendingRoute = localStorage.getItem('peony_pending_route');
                if (pendingRoute) {
                    localStorage.removeItem('peony_pending_route');
                    window.location.href = `../index.html#${pendingRoute}`;
                } else {
                    window.location.href = '../index.html';
                }

            } catch (err) {
                console.error('Auth error:', err);
                document.getElementById('status').textContent = 'Login failed';
                document.getElementById('message').textContent = err.message;
                document.getElementById('message').className = 'error';
                setTimeout(() => window.location.href = '../index.html', 3000);
            }
        }

        handleCallback();
    </script>
</body>
</html>
