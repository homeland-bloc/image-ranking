name = "peony-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
SUPABASE_URL = "https://tbduuuzwbiidjgztupfp.supabase.co"
ADMIN_DISCORD_ID = "719271552247529571"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# General rate limit: 300 requests per minute per IP
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 300, period = 60 }

# Auth endpoint rate limit: 5 requests per minute per IP
[[unsafe.bindings]]
type = "ratelimit"
name = "AUTH_LIMITER"
namespace_id = "1002"
simple = { limit = 5, period = 60 }
